name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

# 同一分支/PR 的新提交会取消仍在跑的旧任务；main 上的提交不取消，保证每次都有完整记录
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # 质量门禁（后端 + 前端）抽到可复用 workflow，与 release.yml 发版前门禁共用同一份定义
  quality:
    uses: ./.github/workflows/quality.yml

  image-build:
    name: Image build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # 只构建不推送，单架构即可，目的是合并前发现 Dockerfile 损坏
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
