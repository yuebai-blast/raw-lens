name: Quality

# 可复用的质量门禁：后端 + 前端检查。供 ci.yml（PR/push）与 release.yml（发版前）共同调用，
# 保证「合并前校验」和「发版前校验」用同一份定义，永不漂移。
on:
  workflow_call:

permissions:
  contents: read

jobs:
  # 后端与前端拆成独立 job 并行跑：失败归因清晰，互不阻塞
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 工具链版本唯一来源是 mise.toml，避免和本地、go.mod 漂移
      - name: Set up toolchain (mise)
        uses: jdx/mise-action@v4

      # 缓存 Go module 下载与编译产物，加快后续 CI
      - name: Cache Go build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      # 命令统一收口到 mise task，与本地、Dockerfile 单一来源，避免漂移
      - name: Check formatting
        run: mise run fmt-backend

      # 本项目并发处理连接、共享同一个 store.Store，task 内开 -race 检测数据竞争
      - name: Run tests (race)
        run: mise run test-backend

      - name: Run vet
        run: mise run vet-backend

      # 验证可编译（web/dist/.keep 已提交，无需前端产物即可 embed）
      - name: Build
        run: mise run build-backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@v4

      # 缓存 pnpm store，加快依赖安装
      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      # 前端依赖（node_modules）不在仓库里，门禁前显式装、走 --frozen 保证可复现
      - name: Install frontend dependencies
        run: mise run install-frontend --frozen

      # typecheck + lint + vitest 收口在一个 task，与本地单一来源
      - name: Check frontend
        run: mise run test-frontend

      - name: Build
        run: mise run build-frontend
