name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

# 发布任务串行，禁止取消：避免两次 tag 同时跑导致产物互相覆盖
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser 需要完整 tag 历史生成 changelog

      # 工具链版本（go、goreleaser）唯一来源是 mise.toml
      - name: Set up toolchain (mise)
        uses: jdx/mise-action@v2

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
