name: Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: # 手动逃生口：重推/回滚验证；日常 push main 不触发

permissions:
  contents: read
  packages: write # 推送到 GHCR 所需

# 与 release 一样串行、禁止取消，避免两次 tag 同时推镜像互相覆盖
concurrency:
  group: image
  cancel-in-progress: false

jobs:
  image:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # latest 仅「tag 触发且非预发布」才打：限定 refs/tags/ 防手动 workflow_dispatch
          # 从分支误打 latest；名字不含 - 即非预发布（如 v1.2.3），带 - 视为预发布（如 v1.2.3-rc.1）
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
