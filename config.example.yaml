# raw-lens 配置文件
# 启动时默认读取当前目录的 config.yaml，也可用 -config /path/to.yaml 指定。
# 文件不存在时使用内置默认值；只需写你想改的字段，其余留空走默认。

capture:
  # 裸 TCP 抓包监听地址 —— 对外暴露这个端口，客户端把请求发到这里
  addr: ":9100"
  tls:
    enabled: false   # 开启后抓包端口走 TLS，可抓 HTTPS 的原始请求
    cert: ""         # 证书文件路径；留空则用内存自签名证书（客户端需 curl -k）
    key: ""          # 私钥文件路径

dashboard:
  # 前端面板监听地址 —— 浏览器开这个看抓到的请求，建议只在内网/本机访问
  addr: ":9101"

store:
  max: 500       # 最多保留多少条请求（超出删最旧）
  mode: SQLITE   # 存储模式：SQLITE=落盘到默认文件 data/db/rawlens.db；MEMORY=内存库（重启即清空）

log:
  # 日志始终输出到 stdout；下面 file 非空时再额外写一份到该文件（lumberjack 按大小滚动）
  file: "data/logs/rawlens.log"   # 留空 "" 则只输出到 stdout、不落文件
  max_size_mb: 10                 # 单个文件超过多少 MB 就滚动
  max_backups: 5                  # 最多保留多少个滚动备份
  max_age_days: 14                # 备份最多保留多少天

auth:
  # 面板登录鉴权：true 才开启，开启后必须用下面的用户名/密码登录才能访问面板
  enabled: false          # false 时面板免登录（与历史版本一致）
  username: ""            # 登录用户名（enabled=true 时必填）
  password: ""            # 登录密码（明文，enabled=true 时必填）
  session_ttl_hours: 168  # 会话有效期（小时），默认 7 天；进程重启后需重新登录
  cookie_secure: false    # true 时会话 cookie 加 Secure（仅 HTTPS 下发送）；公网经 HTTPS 反代访问应设 true
