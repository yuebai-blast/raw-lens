# 只管两件事：锁工具版本 + 定义任务。
# 运行时配置（端口、TLS 等）不放这里——见 README，用 flag 或进程环境变量。
[tools]
go = "1.26.4"
node = "20.18.1"
pnpm = "9.15.9"

[tasks.install]
description = "安装全部依赖（Go 模块 + 前端 pnpm）"
run = ["go mod download", "pnpm -C frontend install"]

[tasks.api]
description = "本地运行后端（提供 /api 与面板，读 ./config.yaml）"
run = "go run ./cmd/rawlens"

[tasks.webui]
description = "本地运行前端 Vite dev server（HMR，proxy /api 到 :9101）"
run = "pnpm -C frontend dev"

[tasks.build]
description = "构建前端并编译单二进制到 bin/rawlens"
run = ["pnpm -C frontend build", "go build -o bin/rawlens ./cmd/rawlens"]

[tasks.test-web]
description = "前端检查：typecheck + lint + vitest"
run = ["pnpm -C frontend typecheck", "pnpm -C frontend lint", "pnpm -C frontend test"]

[tasks.image]
description = "本地构建 Docker 镜像（单架构，验证 Dockerfile）"
run = "docker build -t rawlens:local ."

[tasks.up]
description = "docker compose 后台启动 rawlens"
run = "docker compose up -d"

[tasks.down]
description = "docker compose 停止并移除 rawlens"
run = "docker compose down"

# 发版：本项目版本号纯由 git tag 承载（无版本号文件可改），故只需打 tag + 推送。
# 推送 v*.*.* tag 触发 .github/workflows/image.yml 构建并推镜像到 GHCR。
# 用法（参数按是否像 vX.Y.Z 自动消歧）：
#   mise run release                     # 省略版本号 → 取最新稳定 tag 的 patch+1（v0.3.33 → v0.3.34）
#   mise run release "更新说明"           # patch+1 且带说明（单参数不像版本号即视为说明）
#   mise run release v0.4.0              # 显式指定版本号（升 minor/major、或预发布时用）
#   mise run release v0.4.0 "更新说明"    # 指定版本号 + 说明 → annotated tag（注释可被 Release 流程置顶）
[tasks.release]
description = "发版：打 vX.Y.Z tag 并推送，触发 Image 工作流（参数：[版本号] [更新说明]，均可省略，省略版本号则 patch+1）"
usage = '''
arg "[arg1]" help="版本号(vX.Y.Z) 或 更新说明；只传一个时按是否像版本号自动判断"
arg "[arg2]" help="更新说明（当 arg1 为版本号时）"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

a1="${usage_arg1:-}"
a2="${usage_arg2:-}"

# 参数消歧：版本号长得像 v?X.Y.Z（可带预发布后缀），其余文本一律当更新说明。
is_ver() { printf '%s' "$1" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; }
ver=""
notes=""
if [ -n "${a2}" ]; then
  ver="${a1}"; notes="${a2}"                                   # 传两个：版本号 + 说明
elif [ -n "${a1}" ]; then
  if is_ver "${a1}"; then ver="${a1}"; else notes="${a1}"; fi  # 只传一个：自动判断
fi

# 先抓取远程最新 tag 与 main，供「自动算版本号」和「main 落后检查」共用
git fetch origin main --tags --quiet

if [ -z "${ver}" ]; then
  # 未指定版本号：取最新的稳定 tag（vX.Y.Z，排除预发布）做 patch+1。
  # 用 git 内置版本排序 --sort=-v:refname（不依赖 macOS 不支持 -V 的系统 sort）。
  latest="$(git tag -l --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
  if [ -z "${latest}" ]; then
    echo "✗ 没有可递增的历史 tag，请显式传版本号（如 mise run release v0.1.0）。" >&2
    exit 1
  fi
  base="${latest#v}"            # 去掉 v 前缀：0.3.33
  major="${base%%.*}"          # 0
  rest="${base#*.}"            # 3.33
  minor="${rest%%.*}"          # 3
  patch="${rest##*.}"          # 33
  ver="v${major}.${minor}.$((patch + 1))"
  echo "→ 未指定版本号，基于最新 tag ${latest} 自动递增为 ${ver}"
else
  # 允许传 0.2.0 或 v0.2.0，统一成带 v 前缀
  ver="v${ver#v}"
fi

# 校验形如 vX.Y.Z（可带预发布后缀，如 -rc.1）
if ! printf '%s' "$ver" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
  echo "✗ 版本号不合法：${ver}（应形如 v0.2.0 / v1.0.0-rc.1）" >&2
  exit 1
fi

# 只在 main 上发版
branch="$(git rev-parse --abbrev-ref HEAD)"
if [ "${branch}" != "main" ]; then
  echo "✗ 当前在分支 ${branch}，发版请切到 main。" >&2
  exit 1
fi

# 工作区必须干净，确保 tag 指向的代码与本地一致
if [ -n "$(git status --porcelain)" ]; then
  echo "✗ 工作区有未提交改动，请先提交后再发版。" >&2
  exit 1
fi

# tag 不能重复
if git rev-parse -q --verify "refs/tags/${ver}" >/dev/null; then
  echo "✗ tag ${ver} 已存在。" >&2
  exit 1
fi

# 确保本地 main 不落后于远程，避免基于过期 main 打 tag
if [ -n "$(git rev-list "HEAD..origin/main" 2>/dev/null)" ]; then
  echo "✗ 本地 main 落后于 origin/main，请先 git pull。" >&2
  exit 1
fi

# 有说明用 annotated tag（注释置顶到 Release 正文），无说明用轻量 tag
if [ -n "${notes}" ]; then
  git tag -a "${ver}" -m "${notes}"
else
  git tag "${ver}"
fi

# 先推 main 上的提交，再推 tag 触发 Image 工作流
git push origin main
git push origin "${ver}"

echo "✓ 已发版 ${ver}，Image 工作流将构建镜像并推送到 GHCR。"
'''
