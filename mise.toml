# 只管两件事：锁工具版本 + 定义任务。
# 运行时配置（端口、TLS 等）不放这里——见 README，用 flag 或进程环境变量。
[tools]
go = "1.26.4"
# 发布工具：CI 的 release 与 release-check 都靠它，锁定版本保证可复现
goreleaser = "2.16.0"

[tasks.run]
description = "本地运行（读 ./config.yaml）"
run = "go run ./cmd/rawlens"

[tasks.build]
description = "编译成单二进制 ./bin/rawlens"
run = "go build -o bin/rawlens ./cmd/rawlens"

[tasks.build-linux]
description = "交叉编译 linux/amd64，部署到服务器用"
env = { GOOS = "linux", GOARCH = "amd64", CGO_ENABLED = "0" }
run = "go build -o bin/rawlens-linux-amd64 ./cmd/rawlens"

[tasks.release-check]
description = "校验 .goreleaser.yaml 配置（CI 会跑）"
run = "goreleaser check"

[tasks.release]
description = "本地试跑发布快照，不推送（验证打包产物）"
run = "goreleaser release --snapshot --clean"
