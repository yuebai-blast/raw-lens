<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="raw·lens app icon">
  <!-- 应用图标：圆角方机身 + 居中光圈，可导出各尺寸 png/icns/ico -->
  <defs>
    <radialGradient id="ic" cx="50%" cy="28%" r="90%">
      <stop offset="0" stop-color="#12201b"/><stop offset="0.7" stop-color="#070a09"/>
    </radialGradient>
    <filter id="icg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#ic)"/>
  <rect x="1" y="1" width="510" height="510" rx="113" fill="none" stroke="#1c2723" stroke-width="2"/>
  <g transform="translate(256,256) scale(5.4) translate(-32,-32)" filter="url(#icg)">
    <g fill="none" stroke="#34e0a1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="32" cy="32" r="22" stroke-opacity="0.45"/>
      <polygon points="32,22 23.34,27 23.34,37 32,42 40.66,37 40.66,27"/>
      <line x1="32" y1="22" x2="15.55" y2="22.5"/>
      <line x1="23.34" y1="27" x2="15.55" y2="41.5"/>
      <line x1="23.34" y1="37" x2="32" y2="51"/>
      <line x1="32" y1="42" x2="48.45" y2="41.5"/>
      <line x1="40.66" y1="37" x2="48.45" y2="22.5"/>
      <line x1="40.66" y1="27" x2="32" y2="13"/>
    </g>
    <circle cx="32" cy="32" r="2.4" fill="#34e0a1"/>
  </g>
</svg>
