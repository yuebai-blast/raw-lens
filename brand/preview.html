<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>raw·lens · Logo 预览</title>
  <style>
    body{margin:0;background:#070a09;color:#cfe3da;font:15px/1.6 'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
    .wrap{max-width:1320px;margin:0 auto;padding:48px 24px}
    h1{font-weight:500;letter-spacing:1px}
    h1 b{color:#34e0a1;font-weight:500}
    .muted{color:#4d615a}
    .row{display:flex;flex-wrap:wrap;gap:24px;margin:32px 0}
    .card{background:#0d1513;border:1px solid #1c2723;border-radius:14px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px}
    .card.light{background:#cfe3da}
    .lbl{font-size:12px;letter-spacing:2px;color:#4d615a}
    img{display:block}
    .board img{width:100%;max-width:1240px;border-radius:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>raw<b>·</b>lens · Logo</h1>
    <p class="muted">六边形光圈（对准 / 逐字节看清）+ 中心字节（原样留下的那一个 byte）。矢量交付，可无损缩放。</p>

    <div class="row">
      <div class="card"><img src="raw-lens-mark-dark.svg" width="120" height="120" alt="深底标志"><span class="lbl">MARK · 深底</span></div>
      <div class="card light"><img src="raw-lens-mark.svg" width="120" height="120" alt="浅底标志"><span class="lbl">MARK · 浅底</span></div>
      <div class="card"><img src="raw-lens-app-icon.svg" width="120" height="120" alt="应用图标"><span class="lbl">APP ICON</span></div>
      <div class="card"><img src="raw-lens-favicon.svg" width="64" height="64" alt="favicon"><span class="lbl">FAVICON</span></div>
      <div class="card" style="color:#34e0a1"><img src="raw-lens-mark-mono.svg" width="120" height="120" alt="单色标志"><span class="lbl">MONO · currentColor</span></div>
    </div>

    <div class="row">
      <div class="card" style="align-items:flex-start"><img src="raw-lens-wordmark.svg" width="480" alt="字标组合"><span class="lbl">WORDMARK LOCKUP</span></div>
    </div>

    <div class="row board">
      <div class="card" style="width:100%"><img src="raw-lens-brand-board.svg" alt="品牌标志板"><span class="lbl">BRAND BOARD</span></div>
    </div>
  </div>
</body>
</html>
