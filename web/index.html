<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>raw·lens — wire-level http inspector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="fx-scanlines" aria-hidden="true"></div>
<div class="fx-vignette" aria-hidden="true"></div>

<header class="masthead">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true"></span>
    <div class="brand-text">
      <h1>raw<span class="sep">·</span>lens</h1>
      <p>WIRE-LEVEL HTTP INSPECTOR</p>
    </div>
  </div>

  <div class="readouts">
    <div class="gauge">
      <span class="gauge-label">CAPTURED</span>
      <span class="gauge-value" id="count">0</span>
    </div>
    <div class="gauge status" id="status">
      <span class="signal" aria-hidden="true"></span>
      <span class="gauge-value" id="statusText">CAPTURING</span>
    </div>
    <button id="clear" class="btn-clear" title="清空所有记录">PURGE</button>
  </div>
</header>

<main class="console">
  <aside class="log" id="log" aria-label="captured requests">
    <div class="log-head">SIGNAL LOG</div>
    <div class="log-body" id="list"></div>
  </aside>

  <section class="readout" id="detail">
    <div class="awaiting">
      <div class="awaiting-art" aria-hidden="true">⌁ ⌁ ⌁</div>
      <p class="awaiting-title">AWAITING SIGNAL<span class="cursor">▌</span></p>
      <p class="awaiting-sub">把请求发到抓包端口，原始字节会在此显形<br>顺序 · 大小写 · 重复 header · body —— 一字不改</p>
    </div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
