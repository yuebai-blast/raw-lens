version: 2

project_name: rawlens

before:
  hooks:
    - go mod download

builds:
  - id: rawlens
    main: ./cmd/rawlens
    binary: rawlens
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
    # 用提交时间而非构建时间，保证同一 tag 多次构建产物字节一致（可复现构建）
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: rawlens
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  # 按提交类型分组，未匹配的归到「其他」
  groups:
    - title: 新功能
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: 修复
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: 其他
      order: 999
  filters:
    exclude:
      # 兼容英文 conventional commits 与本项目的中文前缀
      - "^docs:"
      - "^test:"
      - "^chore"
      - "^ci"
      - "^文档"
      - "^测试"
      - "^Merge "

release:
  draft: false
  prerelease: auto
